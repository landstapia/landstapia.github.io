<!DOCTYPE html>
<html data-theme="dark">
<head>
  <meta http-equiv="content-type" content="text/html; charset=utf-8" />
  <title>Prompter</title>
  
  <script src="https://code.jquery.com/jquery-4.0.0-beta.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">

  <script type="text/javascript" src="./scripts/app.js"></script>
  <link rel="stylesheet" href="styles/app.css"></link>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link href="https://fonts.googleapis.com/css2?family=Sriracha&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Atma:wght@600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Birthstone&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Cookie&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Englebert&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Ms+Madi&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Pattaya&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Rouge+Script&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Story+Script&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Fleur+De+Leah&family=Story+Script&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Titan+One&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Emilys+Candy&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,800;1,800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Satisfy&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Nabla&display=swap" rel="stylesheet">
</head>
<body>
  <div id="wrapper">
    <div id="lyrics" class="arial"></div>
    <div id="lyrics-sub" class="arial"></div>
  </div>
  <div id="settings" class="messenger-menu">
    <div class="container">        
     
      <div class="columns is-mobile is-vcentered is-variable is-2">

        <div class="column">
          <div class="field">
            <label class="label">Content:</label>
            <input class="file-input" type="file" id="open_lyrics_file">
            <button class="messenger-btn" onclick="document.getElementById('open_lyrics_file').click()">
              Select File
            </button>
            <p id="status-display" class="help-text">Click to select mark-up file.</p>
          </div>
        </div>

        <div class="column">
          <div class="field">
            <label class="label is-small">Background:</label>
            <div class="control select-wrapper">
              <select id="bg-color" class="messenger-select">
                <option value="rgba(0,0,0,0)">⚪ Transparent</option>
                <option value="rgba(255,0,0,1)">🔴 Red</option>
                <option value="rgba(0,255,0,1)">🟢 Green</option>
                <option value="rgba(0,0,255,1)">🔵 Blue</option>
                <option value="rgba(0,0,0,1)">⚫ Black</option>
              </select>
            </div>
            <p id="status-display" class="help-text">&nbsp;</p>
          </div>
        </div>

        <div class="column">
          <div class="field">
            <label class="label is-small">Text Color:</label>
            <div class="control select-wrapper">
              <select id="text-color" class="messenger-select">
                <option value="#ffffff">⚪ White</option>
                <option value="#000000">⚫ Black</option>
                <option value="#ffeb3b">🟡 Yellow</option>
              </select>
            </div>
            <p id="status-display" class="help-text">&nbsp;</p>
          </div>
        </div>

        <div class="column">
          <div class="field">
            <label class="label is-small">Font:</label>
            <div class="control select-wrapper">
              <select id="text-font" class="messenger-select">
                <option value="arial" class="arial">Arial</option>
                <option value="atma" class="atma">Atma</option>
                <option value="birthstone" class="birthstone">Birthstone</option>
                <option value="cookie" class="cookie">Cookie</option>
                <option value="englebert" class="englebert">Englebert</option>
                <option value="ms-madi" class="ms-madi">Ms Madi</option>
                <option value="pattaya" class="pattaya">Pattaya</option>
                <option value="rouge-script" class="rouge-script">Rouge Script</option>
                <option value="sriracha" class="sriracha">Sriracha</option>
                <option value="story-script" class="story-script">Story Script</option>
                <option value="fleur-de-leah" class="fleur-de-leah">Fleur De Leah</option>
                <option value="titan-one" class="titan-one">Titan one</option>
                <option value="emilys-candy" class="emilys-candy">Emilys candy</option>
                <option value="montserrat" class="montserrat">Montserrat</option>
                <option value="satisfy" class="satisfy">Satisfy</option>
                <option value="permanent-marker" class="permanent-marker">Permanent Marker</option>
            </select>
            </div>
            <p id="status-display" class="help-text">Press <code>F</code> to navigate to all fonts.</p>
          </div>
        </div>

        <div class="column">
          <div class="field">
            <label class="label is-small">Zoom:</label>
            <div class="buttons are-small has-addons" style="margin: 0;">
              <button class="button is-dark messenger-btn-circle" id="zoom-up">
                <i class="fas fa-plus"></i>
              </button>
              <button class="button is-dark messenger-btn-circle" id="zoom-down">
                <i class="fas fa-minus"></i>
              </button>
            </div>
            <p id="status-display" class="help-text">Press <code>+</code>/<code>-</code> to adjust font size.</p>
          </div>
        </div>

      </div>
    </div>
  </div>
</body>
</html>
